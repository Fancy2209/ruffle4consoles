name: build

on: [push, pull_request, workflow_dispatch]

jobs:
    build-psp2:
        name: PSVita
        runs-on: ubuntu-latest
        container: ghcr.io/vita-rust/vitasdk-rs

        steps:
            - uses: actions/checkout@v6

            - name: Install vitaGL
              run: |
                git clone --depth=1 https://github.com/Rinnegatamante/vitaShaRK
                cd vitaShaRK 
                make install -j$(nproc)
                cd ..
                git clone --depth=1 https://github.com/Rinnegatamante/vitaGL
                cd vitaGL
                make PRIMITIVES_SPEEDHACK=1 USE_SCRATCH_MEMORY=1 HAVE_CUSTOM_HEAP=1 HAVE_PTHREAD=1 LOG_ERRORS=1 install -j$(nproc)
     
            - name: Build
              run: ./build_psp2.sh

            - uses: actions/upload-artifact@v7
              with:
                name: vita
                path: target/armv7-sony-vita-newlibeabihf/vita/ruffle4consoles.vpk

    build-nx:
        name: Nintendo Switch
        runs-on: ubuntu-latest
        container: devkitpro/devkita64

        steps:
            - uses: actions/checkout@v6

            - name: Install Java
              run: sudo apt update && sudo apt install default-jdk -y

            - uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                toolchain: nightly
                components: rust-src

            - name: Build
              run: ./build_nx.sh

            - uses: actions/upload-artifact@v7
              with:
                name: switch
                path: target/aarch64-nintendo-switch/switch/ruffle4consoles.nro
        
